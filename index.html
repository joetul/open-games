<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Games</title>
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="shared/css/reset.css">
  <link rel="stylesheet" href="shared/css/theme.css">
  <link rel="stylesheet" href="shared/css/common.css">
  <script src="shared/js/theme-toggle.js" defer></script>
</head>
<body>
  <div class="page">
    <header class="site-header container">
      <h1>Open Games</h1>
      <button class="theme-toggle" aria-label="Toggle theme">
        <!-- Icon injected by theme-toggle.js -->
      </button>
    </header>

    <main class="container">
      <div class="game-grid">
        <a href="games/sudoku/" class="game-card">
          <div class="card-icon" aria-hidden="true">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="2" y="2" width="36" height="36" rx="4" stroke="var(--accent-purple)" stroke-width="2"/>
              <line x1="14" y1="2" x2="14" y2="38" stroke="var(--accent-purple)" stroke-width="1.5"/>
              <line x1="27" y1="2" x2="27" y2="38" stroke="var(--accent-purple)" stroke-width="1.5"/>
              <line x1="2" y1="14" x2="38" y2="14" stroke="var(--accent-purple)" stroke-width="1.5"/>
              <line x1="2" y1="27" x2="38" y2="27" stroke="var(--accent-purple)" stroke-width="1.5"/>
            </svg>
          </div>
          <h2>Sudoku</h2>
          <p>Fill the 9x9 grid so every row, column, and 3x3 box contains the digits 1-9.</p>
        </a>

        <a href="games/wordguess/" class="game-card">
          <div class="card-icon" aria-hidden="true">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="2" y="8" width="10" height="10" rx="2" stroke="var(--accent-green)" stroke-width="2"/>
              <rect x="15" y="8" width="10" height="10" rx="2" stroke="var(--accent-orange)" stroke-width="2"/>
              <rect x="28" y="8" width="10" height="10" rx="2" stroke="var(--accent-purple)" stroke-width="2"/>
              <rect x="2" y="22" width="10" height="10" rx="2" stroke="var(--accent-purple)" stroke-width="2"/>
              <rect x="15" y="22" width="10" height="10" rx="2" stroke="var(--accent-green)" stroke-width="2"/>
            </svg>
          </div>
          <h2>Word Guess</h2>
          <p>Guess the 5-letter word in 6 tries. Each guess reveals which letters are correct.</p>
        </a>

        <!-- Add more game cards here -->
      </div>
    </main>

    <footer class="site-footer">
      <p>Built for fun. <a href="https://github.com" style="color: var(--accent-purple);">View on GitHub</a></p>
    </footer>
  </div>
</body>
</html>
