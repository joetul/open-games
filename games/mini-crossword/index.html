<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Crossword - Open Games</title>
  <script>try{var t=localStorage.getItem('theme');document.documentElement.setAttribute('data-theme',t||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'))}catch(e){document.documentElement.setAttribute('data-theme','dark')}</script>
  <link rel="icon" href="../../assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../shared/css/reset.css">
  <link rel="stylesheet" href="../../shared/css/theme.css">
  <link rel="stylesheet" href="../../shared/css/common.css">
  <link rel="stylesheet" href="mini-crossword.css">
  <script src="../../shared/js/theme-toggle.js" defer></script>
  <script src="../../shared/js/modal.js" defer></script>
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a href="../../" class="back-btn" aria-label="Back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <h1>Mini Crossword</h1>
      <div class="header-actions">
        <a href="https://github.com/joetul/open-games" aria-label="View on GitHub" target="_blank" rel="noopener">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.337-2.22-.252-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
        </a>
        <button class="theme-toggle" aria-label="Toggle theme"></button>
      </div>
    </header>

    <main class="container">
      <div class="toast-container" id="toast-container" aria-live="polite"></div>

      <!-- Controls bar -->
      <div class="controls">
        <div class="controls-left">
          <button class="btn btn-secondary" id="new-game-btn">New Puzzle</button>
        </div>
        <div class="controls-right">
          <div class="timer" id="timer">
            <span id="timer-display">00:00</span>
            <button class="btn btn-secondary btn-small" id="timer-pause" aria-label="Pause timer">
              <svg id="pause-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
              <svg id="play-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Active clue bar -->
      <div class="active-clue-bar" id="active-clue-bar">
        <span class="clue-label" id="clue-label"></span>
        <span class="clue-text" id="clue-text">Select a cell to begin</span>
      </div>

      <!-- Grid centered -->
      <div class="mini-grid-wrapper">
        <div class="crossword-grid" id="crossword-grid" role="grid" aria-label="Mini crossword puzzle grid"></div>
      </div>

      <!-- Clue panels side by side below grid -->
      <div class="clue-panels">
        <div class="clue-panel">
          <h3>Across</h3>
          <ul class="clue-list" id="clues-across"></ul>
        </div>
        <div class="clue-panel">
          <h3>Down</h3>
          <ul class="clue-list" id="clues-down"></ul>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="actions">
        <button class="btn btn-secondary" id="check-btn">Check</button>
        <button class="btn btn-secondary" id="reveal-word-btn">Reveal Word</button>
        <button class="btn btn-secondary" id="clear-btn">Clear</button>
      </div>

      <!-- Confirm clear modal -->
      <div class="modal-overlay" id="clear-modal">
        <div class="modal" role="dialog" aria-modal="true" aria-label="Confirm clear">
          <p>Clear all non-revealed cells?</p>
          <div style="display: flex; gap: 0.75rem; justify-content: center;">
            <button class="btn btn-secondary" id="clear-cancel">Cancel</button>
            <button class="btn btn-primary" id="clear-confirm">Clear</button>
          </div>
        </div>
      </div>

      <!-- Pause modal -->
      <div class="modal-overlay" id="pause-modal">
        <div class="modal" role="dialog" aria-modal="true" aria-label="Game paused">
          <h2>Paused</h2>
          <button class="btn btn-primary" id="resume-btn">Resume</button>
        </div>
      </div>

      <!-- Win modal -->
      <div class="modal-overlay" id="win-modal">
        <div class="modal" role="dialog" aria-modal="true" aria-label="Puzzle complete">
          <button class="modal-close" aria-label="Close">&times;</button>
          <h2>Congratulations!</h2>
          <p id="win-message"></p>
          <button class="btn btn-primary" id="win-new-game">New Puzzle</button>
        </div>
      </div>

      <!-- Loading overlay -->
      <div class="loading-overlay" id="loading-overlay">
        <p>Loading puzzle...</p>
      </div>
    </main>
  </div>

  <script type="module" src="mini-crossword.js"></script>
</body>
</html>
