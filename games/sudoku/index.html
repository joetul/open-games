<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku - Open Games</title>
  <link rel="icon" href="../../assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../shared/css/reset.css">
  <link rel="stylesheet" href="../../shared/css/theme.css">
  <link rel="stylesheet" href="../../shared/css/common.css">
  <link rel="stylesheet" href="sudoku.css">
  <script src="../../shared/js/theme-toggle.js" defer></script>
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a href="../../" class="back-btn" aria-label="Back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <h1>Sudoku</h1>
      <div class="header-actions">
        <a href="https://github.com/joetul/open-games" aria-label="View on GitHub" target="_blank" rel="noopener">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.337-2.22-.252-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
        </a>
        <button class="theme-toggle" aria-label="Toggle theme"></button>
      </div>
    </header>

    <main class="container">
      <!-- Controls bar -->
      <div class="controls">
        <div class="controls-left">
          <div class="difficulty-group" role="group" aria-label="Difficulty">
            <button class="btn btn-secondary difficulty-btn active" data-difficulty="easy">Easy</button>
            <button class="btn btn-secondary difficulty-btn" data-difficulty="medium">Medium</button>
            <button class="btn btn-secondary difficulty-btn" data-difficulty="hard">Hard</button>
            <button class="btn btn-secondary difficulty-btn" data-difficulty="expert">Expert</button>
          </div>
          <button class="btn btn-primary" id="new-game-btn">New Game</button>
        </div>
        <div class="controls-right">
          <div class="timer" aria-label="Timer">
            <span id="timer-display">00:00</span>
            <button class="btn btn-secondary btn-small" id="timer-pause" aria-label="Pause timer">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Sudoku grid -->
      <div class="sudoku-grid" id="sudoku-grid" role="grid" aria-label="Sudoku puzzle"></div>

      <!-- Action buttons -->
      <div class="actions">
        <button class="btn btn-secondary" id="undo-btn" aria-label="Undo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          Undo
        </button>
        <button class="btn btn-secondary" id="pencil-btn" aria-label="Toggle notes mode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
          Notes
        </button>
        <button class="btn btn-secondary" id="erase-btn" aria-label="Erase cell">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16l7-7 10 10z"/><path d="m17.586 6.414 3 3"/></svg>
          Erase
        </button>
        <button class="btn active" id="check-btn" aria-label="Check for errors">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Check
        </button>
      </div>

      <!-- Number pad -->
      <div class="numpad" role="group" aria-label="Number pad">
        <button class="numpad-btn" data-num="1">1</button>
        <button class="numpad-btn" data-num="2">2</button>
        <button class="numpad-btn" data-num="3">3</button>
        <button class="numpad-btn" data-num="4">4</button>
        <button class="numpad-btn" data-num="5">5</button>
        <button class="numpad-btn" data-num="6">6</button>
        <button class="numpad-btn" data-num="7">7</button>
        <button class="numpad-btn" data-num="8">8</button>
        <button class="numpad-btn" data-num="9">9</button>
      </div>

      <!-- Pause modal -->
      <div class="modal-overlay" id="pause-modal">
        <div class="modal">
          <h2>Game Paused</h2>
          <p id="pause-time">00:00</p>
          <button class="btn btn-primary" id="pause-resume">Resume</button>
        </div>
      </div>

      <!-- Win modal -->
      <div class="modal-overlay" id="win-modal">
        <div class="modal">
          <h2>Congratulations!</h2>
          <p id="win-message">You solved the puzzle!</p>
          <button class="btn btn-primary" id="win-new-game">Play Again</button>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="sudoku.js"></script>
</body>
</html>
