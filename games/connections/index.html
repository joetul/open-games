<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#282a36" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f8f8f2" media="(prefers-color-scheme: light)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Connections">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Connections - Open Games</title>
  <script>try{var t=localStorage.getItem('theme');document.documentElement.setAttribute('data-theme',t||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'))}catch(e){document.documentElement.setAttribute('data-theme','dark')}</script>
  <link rel="icon" href="../../assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../../assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="../../manifest.webmanifest">
  <link rel="stylesheet" href="../../shared/css/reset.css">
  <link rel="stylesheet" href="../../shared/css/theme.css">
  <link rel="stylesheet" href="../../shared/css/common.css">
  <link rel="stylesheet" href="connections.css">
  <script src="../../shared/js/theme-toggle.js" defer></script>
  <script src="../../shared/js/modal.js" defer></script>
  <script src="../../shared/js/pwa.js" defer></script>
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a href="../../" class="back-btn" aria-label="Back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <h1>Connections</h1>
      <div class="header-actions">
        <a href="https://github.com/joetul/open-games" aria-label="View on GitHub" target="_blank" rel="noopener">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.337-2.22-.252-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
        </a>
        <button class="theme-toggle" aria-label="Toggle theme"></button>
      </div>
    </header>

    <main class="game-area">
      <div class="toast-container" id="toast-container" aria-live="polite"></div>

      <p class="prompt">Find four groups of four!</p>

      <!-- Solved groups appear here -->
      <div class="solved-groups" id="solved-groups"></div>

      <!-- Word grid -->
      <div class="word-grid" id="word-grid"></div>

      <!-- Mistakes -->
      <div class="mistakes" id="mistakes">
        <span>Mistakes remaining:</span>
        <div class="dots" id="mistake-dots">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="btn" id="shuffle-btn">Shuffle</button>
        <button class="btn" id="deselect-btn">Deselect All</button>
        <button class="btn" id="submit-btn" disabled>Submit</button>
      </div>

      <!-- End modal -->
      <div class="modal-overlay" id="end-modal">
        <div class="modal" role="dialog" aria-modal="true" aria-label="Game result">
          <button class="modal-close" aria-label="Close">&times;</button>
          <h2 id="end-title">Game Over</h2>
          <p id="end-message"></p>
          <div class="modal-results" id="modal-results"></div>
          <button class="btn btn-primary" id="end-new-game">Play Again</button>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="connections.js"></script>
</body>
</html>
