<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Guess - Open Games</title>
  <script>try{var t=localStorage.getItem('theme');document.documentElement.setAttribute('data-theme',t||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'))}catch(e){document.documentElement.setAttribute('data-theme','dark')}</script>
  <link rel="icon" href="../../assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../shared/css/reset.css">
  <link rel="stylesheet" href="../../shared/css/theme.css">
  <link rel="stylesheet" href="../../shared/css/common.css">
  <link rel="stylesheet" href="wordguess.css">
  <script src="../../shared/js/theme-toggle.js" defer></script>
  <script src="../../shared/js/modal.js" defer></script>
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a href="../../" class="back-btn" aria-label="Back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <h1>Word Guess</h1>
      <div class="header-actions">
        <a href="https://github.com/joetul/open-games" aria-label="View on GitHub" target="_blank" rel="noopener">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.337-2.22-.252-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
        </a>
        <button class="theme-toggle" aria-label="Toggle theme"></button>
      </div>
    </header>

    <main class="game-area">
      <!-- Toast notifications -->
      <div class="toast-container" id="toast-container" aria-live="polite"></div>

      <!-- Game board -->
      <div class="board-wrapper">
        <div class="board" id="board">
          <div class="row" data-row="0">
            <div class="tile" data-col="0"></div>
            <div class="tile" data-col="1"></div>
            <div class="tile" data-col="2"></div>
            <div class="tile" data-col="3"></div>
            <div class="tile" data-col="4"></div>
          </div>
          <div class="row" data-row="1">
            <div class="tile" data-col="0"></div>
            <div class="tile" data-col="1"></div>
            <div class="tile" data-col="2"></div>
            <div class="tile" data-col="3"></div>
            <div class="tile" data-col="4"></div>
          </div>
          <div class="row" data-row="2">
            <div class="tile" data-col="0"></div>
            <div class="tile" data-col="1"></div>
            <div class="tile" data-col="2"></div>
            <div class="tile" data-col="3"></div>
            <div class="tile" data-col="4"></div>
          </div>
          <div class="row" data-row="3">
            <div class="tile" data-col="0"></div>
            <div class="tile" data-col="1"></div>
            <div class="tile" data-col="2"></div>
            <div class="tile" data-col="3"></div>
            <div class="tile" data-col="4"></div>
          </div>
          <div class="row" data-row="4">
            <div class="tile" data-col="0"></div>
            <div class="tile" data-col="1"></div>
            <div class="tile" data-col="2"></div>
            <div class="tile" data-col="3"></div>
            <div class="tile" data-col="4"></div>
          </div>
          <div class="row" data-row="5">
            <div class="tile" data-col="0"></div>
            <div class="tile" data-col="1"></div>
            <div class="tile" data-col="2"></div>
            <div class="tile" data-col="3"></div>
            <div class="tile" data-col="4"></div>
          </div>
        </div>
      </div>

      <!-- On-screen keyboard -->
      <div class="keyboard" id="keyboard">
        <div class="keyboard-row">
          <button class="key" data-key="q">Q</button>
          <button class="key" data-key="w">W</button>
          <button class="key" data-key="e">E</button>
          <button class="key" data-key="r">R</button>
          <button class="key" data-key="t">T</button>
          <button class="key" data-key="y">Y</button>
          <button class="key" data-key="u">U</button>
          <button class="key" data-key="i">I</button>
          <button class="key" data-key="o">O</button>
          <button class="key" data-key="p">P</button>
        </div>
        <div class="keyboard-row">
          <div class="spacer-half"></div>
          <button class="key" data-key="a">A</button>
          <button class="key" data-key="s">S</button>
          <button class="key" data-key="d">D</button>
          <button class="key" data-key="f">F</button>
          <button class="key" data-key="g">G</button>
          <button class="key" data-key="h">H</button>
          <button class="key" data-key="j">J</button>
          <button class="key" data-key="k">K</button>
          <button class="key" data-key="l">L</button>
          <div class="spacer-half"></div>
        </div>
        <div class="keyboard-row">
          <button class="key key-wide" data-key="Enter">ENTER</button>
          <button class="key" data-key="z">Z</button>
          <button class="key" data-key="x">X</button>
          <button class="key" data-key="c">C</button>
          <button class="key" data-key="v">V</button>
          <button class="key" data-key="b">B</button>
          <button class="key" data-key="n">N</button>
          <button class="key" data-key="m">M</button>
          <button class="key key-wide" data-key="Backspace" aria-label="Backspace">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
          </button>
        </div>
      </div>
    </main>

    <!-- End game modal -->
    <div class="modal-overlay" id="end-modal">
      <div class="modal" role="dialog" aria-modal="true" aria-label="Game result">
        <button class="modal-close" aria-label="Close">&times;</button>
        <h2 id="end-title">Game Over</h2>
        <p id="end-message"></p>
        <button class="btn btn-primary" id="end-new-game">Play Again</button>
      </div>
    </div>
  </div>

  <script type="module" src="wordguess.js"></script>
</body>
</html>
